<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <link rel="stylesheet" href="../CSS/DOM구조.css">

</head>
<body>
  
  <h1>DOM(document Object Model)</h1>
    <h2>가족관계도 - 태그들의 가족 관계도</h2>
    body<br />
    ├─ h1 <br />
    └─ p <br />

    body
      ├─ h1 <br>
      └─ div <br>
            ├─ p  <br>
            └─ button <br>

    학교  <br>
      ├─ 1학년     <br>
      │    ├─ 철수 <br>
      │    └─ 영희 <br>
      │
      └─ 2학년     <br>
            └─ 민수 <br>


    <p>누가 누구 안에 들어있는지 전부 기억하고있는 구조! DOM</p>
    <p>DOM 지도에서 태그를 찾을 수있도록 해준다. 자바스크립트</p>
    <p>자바스크립트는 document라는 화면에서 DOM구조를 활용해서 태그를 찾는다</p>

  <script src="../JS/DOM구조.js"></script>
</body>
</html>
